name: FeedbackPlugin
version: "1.0.0"
main: com.example.feedbackplugin.FeedbackPlugin
api-version: "1.20"
description: Allows players to submit feedback directly to a Discord channel.
authors: [SwitchPro]

commands:
  feedback:
    description: Submit feedback to the server staff.
    usage: /feedback <bug|suggestion|general> <message>
    permission: feedbackplugin.use
    aliases: [ fb ]

permissions:
  feedbackplugin.use:
    description: Allows a player to use /feedback
    default: true
